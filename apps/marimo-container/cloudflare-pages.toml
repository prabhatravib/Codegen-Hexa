[build]
  command = "pip install -r requirements.txt"
  publish = "."

[build.environment]
  PYTHON_VERSION = "3.11"

[[redirects]]
  from = "/health"
  to = "/api/health"
  status = 200

[[redirects]]
  from = "/edit"
  to = "/api/edit"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
